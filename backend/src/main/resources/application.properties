spring.application.name=ragbot

server.port=8080

spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/ragbot
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Ollama API configuration
ollama.base-url=http://localhost:11434
ollama.chat.model=qwen2.5:7b
ollama.embedding.model=nomic-embed-text

# Crawler configuration
crawler.max-pages=500
crawler.max-depth=8
crawler.same-domain-only=true
crawler.respect-robots=true
crawler.crawl-delay-ms=100
crawler.exclude-query-parameters=true
crawler.max-concurrent-pages=5